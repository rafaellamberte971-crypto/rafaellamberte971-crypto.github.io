<!DOCTYPE html>
<html>
<head>
    <title>Kitten Gallery - MEOWGICAL WORLD</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        html {
            height: 100%;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh; 
            background-image: url('images/lokie-posing.jpg');
            background-size: cover; 
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Lato', sans-serif;
            color: white;
            text-align: center; /* Centers everything for a balanced look */
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #ffffff;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-top: 50px;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.8);
        }

        .content-box {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 4px;
            margin: 20px auto;
            display: inline-block;
            max-width: 800px;
            border-top: 3px solid yellow; /* Top accent bar for gallery pages */
            font-style: italic;
            font-size: 1.1rem;
        }

        /* THE GALLERY GRID - This makes it look like a pro layout */
        .photo-grid {
            display: grid;
            /* Creates 3 equal columns on desktop, 1 on mobile */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-card {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 2px;
            transition: transform 0.4s ease;
        }

        .photo-card:hover {
            transform: translateY(-10px); /* Lifts the photo when you hover */
            background-color: rgba(255, 255, 255, 0.2);
        }

        img {
            width: 100%;      /* Makes images responsive inside the grid */
            height: 300px;    /* Forces all gallery images to be the same height */
            object-fit: cover; /* Crops the photos perfectly so they don't stretch */
            border: 5px solid white;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .back-link {
            font-family: 'Playfair Display', serif;
            font-weight: 700; 
            color: #000;             /* Black text for contrast */
           background-color: yellow; /* Bright background to make it visible */
            text-decoration: none; 
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 30px;      /* Makes it look like a physical button */
           border-radius: 2px;
           display: inline-block;
           margin: 40px 0;
           transition: all 0.3s ease;
           box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }

            /* Effect when you hover the mouse over it */
        .back-link:hover {
            background-color: white;
            color: #ff4d4d;
            transform: scale(1.05);
        }

           /* The 'Underline' effect when the button is clicked */
      .back-link:active {
           text-decoration: underline;
            background-color: #ffd700; /* Slightly darker yellow when pressed */
            transform: scale(0.98);    /* Makes it feel like a real button being pushed */
        }
    </style>
</head>

<body> 

    <h1>BABIE BARIE'S FRIENDS</h1>

    <div class="content-box">
        Welcome to the gallery! Here are even more photos of our cutie cats.
    </div>

    <div class="photo-grid">
        <div class="photo-card">
            <img src="images/babie-momie.jpg" alt="kitten photo">
        </div>
        <div class="photo-card">
            <img src="images/mochiche.jpg" alt="another kitten">
        </div>
        <div class="photo-card">
            <img src="images/lokikie.jpg" alt="another cute kitten">
        </div>
         <div class="photo-card">
            <img src="images/twi-mi.jpg" alt="another cute kitten">
        </div>
         <div class="photo-card">
            <img src="images/kit-mie-bed.jpg" alt="another cute kitten">
        </div>
        </div>

    <br>
    <a href="index.html" class="back-link">← Go Back Home</a>

</body>
</html>
